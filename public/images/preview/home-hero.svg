<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 720" role="img" aria-label="电气控制柜与工程交付场景示意">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1f33"/>
      <stop offset="1" stop-color="#071423"/>
    </linearGradient>
    <radialGradient id="a" cx="22%" cy="30%" r="55%">
      <stop offset="0" stop-color="#d97706" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b" cx="74%" cy="26%" r="60%">
      <stop offset="0" stop-color="#0f766e" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#0f766e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cab" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f2238"/>
      <stop offset="1" stop-color="#0a1a2c"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1920" height="720" fill="url(#bg)"/>
  <rect width="1920" height="720" fill="url(#a)"/>
  <rect width="1920" height="720" fill="url(#b)"/>

  <g opacity="0.26">
    <path d="M0 560H1920" stroke="#ffffff" stroke-opacity="0.25"/>
    <path d="M0 520H1920" stroke="#ffffff" stroke-opacity="0.10"/>
    <path d="M0 600H1920" stroke="#ffffff" stroke-opacity="0.10"/>
  </g>

  <g transform="translate(1040 120)">
    <rect x="0" y="0" width="620" height="520" rx="28" fill="url(#cab)" stroke="#ffffff" stroke-opacity="0.12"/>
    <rect x="40" y="44" width="240" height="160" rx="16" fill="#0b1f33" stroke="#ffffff" stroke-opacity="0.12"/>
    <rect x="40" y="230" width="540" height="260" rx="18" fill="#081625" stroke="#ffffff" stroke-opacity="0.10"/>

    <g opacity="0.9" filter="url(#glow)">
      <circle cx="86" cy="98" r="7" fill="#d97706"/>
      <circle cx="118" cy="98" r="7" fill="#0f766e"/>
      <circle cx="150" cy="98" r="7" fill="#60a5fa"/>
    </g>

    <g opacity="0.18">
      <path d="M86 270h448" stroke="#ffffff" stroke-width="2"/>
      <path d="M86 310h448" stroke="#ffffff" stroke-width="2"/>
      <path d="M86 350h448" stroke="#ffffff" stroke-width="2"/>
      <path d="M86 390h448" stroke="#ffffff" stroke-width="2"/>
      <path d="M86 430h448" stroke="#ffffff" stroke-width="2"/>
      <path d="M86 470h448" stroke="#ffffff" stroke-width="2"/>
    </g>
  </g>

  <g opacity="0.32" transform="translate(160 140)">
    <path d="M0 360c180-220 340-160 520-340 160-160 420-180 640-60" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="6"/>
    <circle cx="32" cy="340" r="5" fill="#ffffff"/>
    <circle cx="520" cy="40" r="5" fill="#ffffff"/>
    <circle cx="1040" cy="80" r="5" fill="#ffffff"/>
  </g>

  <rect width="1920" height="720" fill="url(#bg)" opacity="0.18"/>
</svg>

