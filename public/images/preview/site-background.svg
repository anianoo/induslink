<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 1600" role="img" aria-label="工业质感背景">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1f33"/>
      <stop offset="0.55" stop-color="#122a43"/>
      <stop offset="1" stop-color="#0b1f33"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="18%" r="55%">
      <stop offset="0" stop-color="#d97706" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="78%" cy="22%" r="55%">
      <stop offset="0" stop-color="#0f766e" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#0f766e" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
      <path d="M24 0V48M0 24H48" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="2400" height="1600" fill="url(#bg)"/>
  <rect width="2400" height="1600" fill="url(#glow1)"/>
  <rect width="2400" height="1600" fill="url(#glow2)"/>
  <rect width="2400" height="1600" fill="url(#grid)"/>

  <g opacity="0.55" filter="url(#soft)">
    <path d="M260 1180C520 880 740 880 980 640c280-280 600-320 920-100" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="10"/>
    <path d="M240 1040c300-240 520-180 820-460 320-300 720-340 1080-160" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="8"/>
  </g>

  <g opacity="0.22">
    <circle cx="520" cy="520" r="6" fill="#ffffff"/>
    <circle cx="740" cy="360" r="6" fill="#ffffff"/>
    <circle cx="1260" cy="520" r="6" fill="#ffffff"/>
    <circle cx="1680" cy="420" r="6" fill="#ffffff"/>
    <circle cx="1960" cy="720" r="6" fill="#ffffff"/>
  </g>
</svg>

